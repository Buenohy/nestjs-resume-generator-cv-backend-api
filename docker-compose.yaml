services:
  postgres:
    image: bitnami/postgresql:15
    container_name: resume_db
    restart: always
    environment:
      POSTGRESQL_USERNAME: admin
      POSTGRESQL_PASSWORD: adminpassword
      POSTGRESQL_DATABASE: resume_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql

volumes:
  postgres_data:
